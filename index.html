<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
  <style>
    body { 
      background-color: #000;
      margin: 0; 
      display: flex; 
      flex-direction: column;
      justify-content: center; 
      align-items: center; 
      height: 100vh; 
      overflow: hidden;
      color: white;
      font-family: 'serif';
    }
    #math-display { 
      font-size: 38px; 
      text-shadow: 0 0 8px rgba(255,255,255,0.6);
      margin-bottom: 10px;
    }
    #result-display {
      font-size: 24px;
      color: #00ffcc;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div id="math-display">Esperando...</div>
  <div id="result-display"></div>

  <script>
    window.addEventListener('message', function(event) {
      const display = document.getElementById('math-display');
      const resDisplay = document.getElementById('result-display');
      const rawInput = event.data; 

      try {
        const resultado = math.evaluate(rawInput);
        
        display.innerHTML = `\\( ${rawInput} \\)`;
        resDisplay.innerHTML = `\\( = ${resultado} \\)`;

        MathJax.typesetPromise([display, resDisplay]).then(() => {
          window.parent.postMessage({
            type: 'calculation',
            original: rawInput,
            result: resultado
          }, '*');
        });

      } catch (error) {
        display.innerHTML = `\\( ${rawInput} \\)`;
        resDisplay.innerHTML = "";
        MathJax.typesetPromise([display]);
        
        window.parent.postMessage({
          type: 'text_only',
          value: rawInput
        }, '*');
      }
    });
  </script>
</body>
</html>
