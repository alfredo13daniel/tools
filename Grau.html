<html>
  <head>
    <title>×</title>
  </head>

        justify-content: space-between;
        align-items: center;

        padding-top: 30px;

      font-family: georgia">
  </h1>
    <script>
      let x;
      let y;
      let ejer;
      let resp;
      function G (titulo) {
        x = Math.floor(Math.random()*21)-10;
        y = Math.floor(Math.random()*21)-10;
        if (titulo == false) {
          resp = `<span>x<sup style="font-size: 0.5em; vertical-align: super";>${x+y}</sup>`;
          ejer = document.getElementById("a")
          a.innerHTML = `<span>x<sup style="font-size: 0.5em; vertical-align: super;">${x}</sup> &times x<sup style="font-size: 0.5em; vertical-align: super;">${y}</sup>`;
        } else {
          a.innerHTML = resp
        }
      }
      window.onclick = function () {
        G(ejer.innerHTML.includes("×"));
      }
      window.onkeydown = function() {
        G(ejer.innerHTML.includes("×"));
      };
      G(false);
    </script>
  </body>
</html>
